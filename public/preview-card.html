<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3a5f 0%, #1e40af 60%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .card {
      text-align: center;
      color: white;
      padding: 60px;
    }
    .bolt {
      font-size: 90px;
      line-height: 1;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 16px rgba(250,204,21,0.5));
    }
    h1 {
      font-size: 72px;
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 16px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .subtitle {
      font-size: 28px;
      font-weight: 600;
      color: #93c5fd;
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }
    .desc {
      font-size: 20px;
      color: #bfdbfe;
      max-width: 780px;
      margin: 0 auto 40px;
      line-height: 1.5;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      padding: 10px 24px;
      font-size: 17px;
      color: #e0f2fe;
      font-weight: 500;
    }
    .asterisk {
      font-size: 22px;
      color: #f97316;
      font-weight: 900;
    }
    .url {
      margin-top: 28px;
      font-size: 16px;
      color: #60a5fa;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bolt">⚡</div>
    <h1>CaseRouter</h1>
    <div class="subtitle">Intelligent Field Service Routing Demo</div>
    <div class="desc">
      AI-style agent routing · Telegram notifications · Customer feedback loops
    </div>
    <div class="badge">
      <span class="asterisk">✳</span>
      Built with Claude &nbsp;·&nbsp; MBA Capstone Project
    </div>
    <div class="url">chasingjarvis-5.netlify.app</div>
  </div>
</body>
</html>
